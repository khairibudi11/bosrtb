<!DOCTYPE html>
<html lang="id">
  <head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIP-BOS | Midnight Gold Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
      :root {
        --primary: #c5a059; /* Gold Metallic */
        --primary-dark: #a67c37;
        --bg-dark: #121417; /* Deep Charcoal */
        --card-bg: #1c1f24;
        --text-main: #ffffff;
        --text-muted: #94a3b8;
        --success: #10b981;
        --danger: #ef4444;
        --border: rgba(197, 160, 89, 0.2);
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'Montserrat', sans-serif;
        background-color: var(--bg-dark);
        color: var(--text-main);
        min-height: 100vh;
        background-image: linear-gradient(to bottom right, #121417, #1e293b);
      }

      .container {
        max-width: 1100px;
        margin: 0 auto;
        padding: 50px 20px;
      }

      /* --- HEADER --- */
      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 50px;
        border-bottom: 1px solid var(--border);
        padding-bottom: 25px;
      }

      .brand h1 {
        font-size: 24px;
        font-weight: 800;
        letter-spacing: 2px;
        color: var(--primary);
        text-transform: uppercase;
      }

      .brand p {
        font-size: 12px;
        color: var(--text-muted);
        margin-top: 5px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      /* --- NAVIGATION --- */
      .nav-bar {
        display: flex;
        gap: 15px;
        margin-bottom: 40px;
      }

      .nav-btn {
        padding: 12px 28px;
        background: transparent;
        border: 1px solid var(--border);
        color: var(--primary);
        border-radius: 4px; /* Sharp corporate look */
        font-weight: 600;
        font-size: 13px;
        cursor: pointer;
        transition: 0.3s;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .nav-btn.active {
        background: var(--primary);
        color: var(--bg-dark);
        border-color: var(--primary);
        box-shadow: 0 0 15px rgba(197, 160, 89, 0.3);
      }

      .nav-btn:hover:not(.active) {
        background: rgba(197, 160, 89, 0.1);
      }

      /* --- GRID --- */
      .grid {
        display: grid;
        grid-template-columns: 1fr 1.3fr;
        gap: 30px;
      }

      .card {
        background: var(--card-bg);
        border: 1px solid var(--border);
        padding: 40px;
        position: relative;
        overflow: hidden;
      }

      /* Saldo Card */
      .saldo-card {
        display: flex;
        flex-direction: column;
        justify-content: center;
        border-left: 4px solid var(--primary);
      }

      .saldo-card::after {
        content: '\f51e'; /* Fa icon coins */
        font-family: 'Font Awesome 6 Free';
        font-weight: 900;
        position: absolute;
        font-size: 120px;
        color: rgba(197, 160, 89, 0.03);
        bottom: -20px;
        right: -10px;
      }

      .label {
        font-size: 11px;
        font-weight: 700;
        color: var(--primary);
        text-transform: uppercase;
        letter-spacing: 3px;
        margin-bottom: 20px;
      }

      #display-saldo {
        font-size: 44px;
        font-weight: 300; /* Thin elegant weight */
        color: #fff;
        margin-bottom: 10px;
      }

      .status-badge {
        font-size: 10px;
        color: var(--success);
        display: flex;
        align-items: center;
        gap: 8px;
        font-weight: 600;
      }

      /* Form Section */
      .form-title {
        font-size: 18px;
        font-weight: 700;
        margin-bottom: 30px;
        text-transform: uppercase;
        letter-spacing: 1px;
        display: flex;
        align-items: center;
        gap: 15px;
      }

      .form-title::after {
        content: '';
        flex: 1;
        height: 1px;
        background: var(--border);
      }

      .switch {
        display: flex;
        margin-bottom: 30px;
        border: 1px solid var(--border);
        border-radius: 4px;
      }

      .switch-btn {
        flex: 1;
        padding: 14px;
        border: none;
        background: transparent;
        color: var(--text-muted);
        font-weight: 700;
        font-size: 12px;
        cursor: pointer;
        transition: 0.3s;
        text-transform: uppercase;
      }

      .switch-btn.active.in { background: rgba(16, 185, 129, 0.1); color: var(--success); }
      .switch-btn.active.out { background: rgba(239, 68, 68, 0.1); color: var(--danger); }

      .input-field {
        margin-bottom: 25px;
      }

      .input-field label {
        display: block;
        font-size: 11px;
        font-weight: 600;
        color: var(--text-muted);
        margin-bottom: 10px;
        text-transform: uppercase;
      }

      .control {
        width: 100%;
        padding: 14px 18px;
        background: rgba(255,255,255,0.03);
        border: 1px solid var(--border);
        color: white;
        font-family: inherit;
        font-size: 14px;
        outline: none;
        transition: 0.3s;
      }

      .control:focus {
        border-color: var(--primary);
        background: rgba(255,255,255,0.06);
      }

      .btn-submit {
        width: 100%;
        padding: 18px;
        background: var(--primary);
        color: var(--bg-dark);
        border: none;
        font-weight: 800;
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 1px;
        cursor: pointer;
        transition: 0.3s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
      }

      .btn-submit:hover {
        background: var(--primary-dark);
        transform: translateY(-2px);
      }

      /* --- RESPONSIVE --- */
      @media (max-width: 900px) {
        .grid { grid-template-columns: 1fr; }
        .container { padding: 30px 20px; }
      }
    </style>
  </head>
  <body>

    <div class="container">
      <header>
        <div class="brand">
          <h1>SIP-BOS <span style="font-weight: 300;">PRO</span></h1>
          <p>Portal Keuangan Terpadu SDN Rantau Bujur</p>
        </div>
        <div style="text-align: right; color: var(--text-muted); font-size: 10px; font-weight: 700;">
          SISTEM KEAMANAN TINGKAT TINGGI<br>
          <span style="color: var(--primary)">ENCRYPTED CLOUD SERVER</span>
        </div>
      </header>

      <div class="nav-bar">
        <button class="nav-btn active" onclick="switchSource('BOS Reguler', this)">BOS Reguler</button>
        <button class="nav-btn" onclick="switchSource('BOS Kas', this)">BOS Kas Sekolah</button>
      </div>

      <div class="grid">
        <!-- BALANCE -->
        <div class="card saldo-card">
          <span class="label" id="current-tag">Balance BOS Reguler</span>
          <div id="display-saldo">Rp 0</div>
          <div class="status-badge">
            <i class="fas fa-shield-alt"></i> VERIFIED BY TREASURY SYSTEM
          </div>
        </div>

        <!-- FORM -->
        <div class="card">
          <h3 class="form-title">Pencatatan Baru</h3>
          
          <form id="transaksiForm">
            <input type="hidden" id="input-jenis" name="jenisBuku" value="BOS Reguler">
            <input type="hidden" id="input-tipe" name="tipe" value="Pemasukan">

            <div class="switch">
              <button type="button" class="switch-btn active in" id="toggle-in" onclick="changeMode('Pemasukan')">Pemasukan</button>
              <button type="button" class="switch-btn" id="toggle-out" onclick="changeMode('Pengeluaran')">Pengeluaran</button>
            </div>

            <div class="input-field">
              <label>Uraian Transaksi</label>
              <input type="text" name="deskripsi" class="control" placeholder="Input rincian kegiatan..." required>
            </div>

            <div class="input-field">
              <label>Nominal (IDR)</label>
              <input type="text" name="nominal" id="nominal-input" class="control" placeholder="0" required onkeyup="moneyFormat(this)">
            </div>

            <div class="input-field">
              <label>Referensi Dokumentasi</label>
              <input type="text" name="keterangan" class="control" placeholder="Nomor BKU / Kode Nota">
            </div>

            <button type="button" class="btn-submit" id="save-btn" onclick="submitData()">
              OTORISASI & SIMPAN <i class="fas fa-lock"></i>
            </button>
          </form>
        </div>
      </div>
    </div>

    <script>
      const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz6LCNUKo_J26dfqGRVPUd9LpPlM27S0LBF5ztctlMt2zNDiiSsM0dLlQhiioucNuaqBQ/exec";

      window.onload = () => loadBalance();

      function moneyFormat(el) {
        let value = el.value.replace(/\D/g, '');
        el.value = value.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
      }

      function switchSource(source, btn) {
        document.querySelectorAll('.nav-btn').forEach(l => l.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('input-jenis').value = source;
        document.getElementById('current-tag').innerText = "Balance " + source;
        loadBalance();
      }

      function loadBalance() {
        const source = document.getElementById('input-jenis').value;
        const saldoDiv = document.getElementById('display-saldo');
        saldoDiv.style.opacity = "0.2";
        
        fetch(`${SCRIPT_URL}?sheet=${encodeURIComponent(source)}`)
          .then(res => res.json())
          .then(data => {
            saldoDiv.innerText = data.saldo;
            saldoDiv.style.opacity = "1";
            
            // Scalable text
            const len = data.saldo.length;
            if(len > 18) saldoDiv.style.fontSize = "26px";
            else if(len > 14) saldoDiv.style.fontSize = "32px";
            else saldoDiv.style.fontSize = "44px";
          })
          .catch(() => {
            saldoDiv.innerText = "Error";
          });
      }

      function changeMode(mode) {
        document.getElementById('input-tipe').value = mode;
        const tin = document.getElementById('toggle-in');
        const tout = document.getElementById('toggle-out');

        if(mode === 'Pemasukan') {
          tin.classList.add('active', 'in');
          tout.classList.remove('active', 'out');
        } else {
          tout.classList.add('active', 'out');
          tin.classList.remove('active', 'in');
        }
      }

      async function submitData() {
        const btn = document.getElementById('save-btn');
        const form = document.getElementById('transaksiForm');
        
        const payload = {
          jenisBuku: document.getElementById('input-jenis').value,
          tipe: document.getElementById('input-tipe').value,
          deskripsi: form.deskripsi.value,
          nominal: form.nominal.value,
          keterangan: form.keterangan.value
        };

        if(!payload.nominal || !payload.deskripsi) {
          return Swal.fire({
            background: '#1c1f24',
            color: '#fff',
            icon: 'warning',
            title: 'Validasi Gagal',
            text: 'Harap lengkapi semua field wajib.',
            confirmButtonColor: '#c5a059'
          });
        }

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> MEMPROSES...';

        try {
          const res = await fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify(payload)
          });
          const result = await res.json();

          if (result.result.includes("Berhasil")) {
            Swal.fire({
              background: '#1c1f24',
              color: '#fff',
              icon: 'success',
              title: 'Tersinkronisasi',
              text: 'Data telah berhasil disimpan ke database cloud.',
              timer: 2000,
              showConfirmButton: false
            }).then(() => {
              form.reset();
              loadBalance();
            });
          }
        } catch (e) {
          Swal.fire({
            background: '#1c1f24',
            color: '#fff',
            icon: 'error',
            title: 'Network Error',
            text: 'Gagal menghubungi server.',
            confirmButtonColor: '#c5a059'
          });
        } finally {
          btn.disabled = false;
          btn.innerHTML = 'OTORISASI & SIMPAN <i class="fas fa-lock"></i>';
        }
      }
    </script>
  </body>
</html>
