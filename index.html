<!DOCTYPE html>
<html lang="id">
  <head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIP-BOS | Blossom Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
      :root {
        --primary: #ffb7ce; /* Sakura Pink */
        --secondary: #dcd3ff; /* Soft Lavender */
        --accent: #b2f2bb; /* Soft Mint */
        --text: #5f6368;
        --bg: #fff9fb;
        --card: #ffffff;
        --danger: #ff8787;
        --success: #63e6be;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'Quicksand', sans-serif;
        background-color: var(--bg);
        color: var(--text);
        min-height: 100vh;
        background-image: 
          radial-gradient(at 0% 0%, rgba(255, 183, 206, 0.2) 0px, transparent 50%),
          radial-gradient(at 100% 100%, rgba(220, 211, 255, 0.2) 0px, transparent 50%);
        display: flex;
        justify-content: center;
        padding: 40px 20px;
      }

      .app-container {
        width: 100%;
        max-width: 900px;
      }

      /* --- HEADER --- */
      header {
        text-align: center;
        margin-bottom: 40px;
      }

      .header-icon {
        font-size: 40px;
        color: var(--primary);
        margin-bottom: 10px;
        display: inline-block;
        filter: drop-shadow(0 4px 6px rgba(255, 183, 206, 0.4));
      }

      header h1 {
        font-size: 32px;
        font-weight: 700;
        color: #ff85a1;
        letter-spacing: -0.5px;
      }

      header p {
        font-size: 14px;
        color: #a5aab0;
        font-weight: 500;
        margin-top: 5px;
      }

      /* --- NAV PILLS --- */
      .nav-pills {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin-bottom: 30px;
      }

      .pill {
        padding: 12px 25px;
        border: none;
        background: var(--card);
        border-radius: 20px;
        font-family: inherit;
        font-weight: 700;
        color: #ff85a1;
        cursor: pointer;
        transition: 0.3s;
        box-shadow: 0 4px 15px rgba(255, 183, 206, 0.15);
      }

      .pill.active {
        background: linear-gradient(135deg, var(--primary), #ff85a1);
        color: white;
        box-shadow: 0 8px 20px rgba(255, 183, 206, 0.4);
        transform: translateY(-2px);
      }

      /* --- MAIN GRID --- */
      .main-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 25px;
      }

      .card {
        background: var(--card);
        border-radius: 30px;
        padding: 35px;
        box-shadow: 0 15px 35px rgba(255, 183, 206, 0.1);
        border: 2px solid rgba(255, 255, 255, 0.8);
      }

      /* Saldo Card */
      .balance-card {
        text-align: center;
        background: linear-gradient(135deg, #ffffff, #fff0f3);
        position: relative;
        overflow: hidden;
      }

      .balance-card::after {
        content: '\f004';
        font-family: 'Font Awesome 6 Free';
        font-weight: 900;
        position: absolute;
        bottom: -20px;
        right: -10px;
        font-size: 100px;
        color: rgba(255, 183, 206, 0.05);
      }

      .bal-label {
        font-size: 13px;
        font-weight: 700;
        color: #ff85a1;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 10px;
        display: block;
      }

      #display-saldo {
        font-size: 44px;
        font-weight: 700;
        color: #5f6368;
      }

      .sync-msg {
        margin-top: 15px;
        font-size: 12px;
        color: #a5aab0;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
      }

      /* Form Section */
      .form-title {
        font-size: 20px;
        font-weight: 700;
        margin-bottom: 25px;
        color: #ff85a1;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .type-toggle {
        display: flex;
        background: #fdf2f5;
        padding: 6px;
        border-radius: 18px;
        margin-bottom: 25px;
      }

      .t-btn {
        flex: 1;
        padding: 12px;
        border: none;
        background: transparent;
        border-radius: 14px;
        font-weight: 700;
        font-family: inherit;
        cursor: pointer;
        transition: 0.3s;
        color: #ffb7ce;
      }

      .t-btn.active.in { background: var(--accent); color: #2b8a3e; }
      .t-btn.active.out { background: var(--primary); color: white; }

      .input-wrapper { margin-bottom: 20px; }
      .input-wrapper label {
        display: block;
        font-size: 13px;
        font-weight: 700;
        margin-bottom: 8px;
        padding-left: 10px;
        color: #868e96;
      }

      .pastel-input {
        width: 100%;
        padding: 15px 20px;
        background: #fdfdfe;
        border: 2px solid #f1f3f5;
        border-radius: 18px;
        font-family: inherit;
        font-size: 15px;
        outline: none;
        transition: 0.3s;
        color: var(--text);
      }

      .pastel-input:focus {
        border-color: var(--primary);
        background: #fff;
        box-shadow: 0 5px 15px rgba(255, 183, 206, 0.2);
      }

      .btn-submit {
        width: 100%;
        padding: 18px;
        background: linear-gradient(135deg, var(--primary), #ff85a1);
        color: white;
        border: none;
        border-radius: 20px;
        font-weight: 700;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
        box-shadow: 0 10px 20px rgba(255, 183, 206, 0.3);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }

      .btn-submit:hover {
        transform: translateY(-3px);
        box-shadow: 0 15px 25px rgba(255, 183, 206, 0.4);
      }

      .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }

      @media (min-width: 768px) {
        .main-grid { grid-template-columns: 1fr 1.3fr; align-items: start; }
      }
    </style>
  </head>
  <body>

    <div class="app-container">
      <header>
        <div class="header-icon"><i class="fas fa-flower"></i></div>
        <h1>SIP-BOS <span style="font-weight: 300;">Blossom</span></h1>
        <p>Pencatatan Keuangan Cantik & Rapi</p>
      </header>

      <nav class="nav-pills">
        <button class="pill active" onclick="switchSource('BOS Reguler', this)">BOS Reguler</button>
        <button class="pill" onclick="switchSource('BOS Kas', this)">BOS Kas</button>
      </nav>

      <div class="main-grid">
        <!-- BALANCE -->
        <div class="card balance-card">
          <span class="bal-label" id="current-tag">Saldo BOS Reguler</span>
          <div id="display-saldo">Rp 0</div>
          <div class="sync-msg">
            <i class="fas fa-heart" style="color: var(--primary)"></i> Tersimpan di Cloud
          </div>
        </div>

        <!-- FORM -->
        <div class="card">
          <h3 class="form-title"><i class="fas fa-pen-fancy"></i> Catatan Baru</h3>
          
          <form id="transaksiForm">
            <input type="hidden" id="input-jenis" name="jenisBuku" value="BOS Reguler">
            <input type="hidden" id="input-tipe" name="tipe" value="Pemasukan">

            <div class="type-toggle">
              <button type="button" class="t-btn active in" id="toggle-in" onclick="changeMode('Pemasukan')">Masuk</button>
              <button type="button" class="t-btn" id="toggle-out" onclick="changeMode('Pengeluaran')">Keluar</button>
            </div>

            <div class="input-wrapper">
              <label>Rincian Transaksi</label>
              <input type="text" name="deskripsi" class="pastel-input" placeholder="Apa kegiatannya?" required>
            </div>

            <div class="input-wrapper">
              <label>Nominal (Rp)</label>
              <input type="text" name="nominal" id="nominal-input" class="pastel-input" placeholder="0" required onkeyup="moneyFormat(this)">
            </div>

            <div class="input-wrapper">
              <label>Keterangan Tambahan</label>
              <input type="text" name="keterangan" class="pastel-input" placeholder="Toko atau No. Nota">
            </div>

            <button type="button" class="btn-submit" id="save-btn" onclick="submitData()">
              Simpan Catatan <i class="fas fa-save"></i>
            </button>
          </form>
        </div>
      </div>
    </div>

    <script>
      const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz6LCNUKo_J26dfqGRVPUd9LpPlM27S0LBF5ztctlMt2zNDiiSsM0dLlQhiioucNuaqBQ/exec";

      window.onload = () => loadBalance();

      function moneyFormat(el) {
        let value = el.value.replace(/\D/g, '');
        el.value = value.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
      }

      function switchSource(source, btn) {
        document.querySelectorAll('.pill').forEach(l => l.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('input-jenis').value = source;
        document.getElementById('current-tag').innerText = "Saldo " + source;
        loadBalance();
      }

      function loadBalance() {
        const source = document.getElementById('input-jenis').value;
        const saldoDiv = document.getElementById('display-saldo');
        saldoDiv.style.opacity = "0.3";
        
        fetch(`${SCRIPT_URL}?sheet=${encodeURIComponent(source)}`)
          .then(res => res.json())
          .then(data => {
            saldoDiv.innerText = data.saldo;
            saldoDiv.style.opacity = "1";
            
            const len = data.saldo.length;
            if(len > 18) saldoDiv.style.fontSize = "26px";
            else if(len > 14) saldoDiv.style.fontSize = "34px";
            else saldoDiv.style.fontSize = "44px";
          })
          .catch(() => {
            saldoDiv.innerText = "Error";
          });
      }

      function changeMode(mode) {
        document.getElementById('input-tipe').value = mode;
        const tin = document.getElementById('toggle-in');
        const tout = document.getElementById('toggle-out');

        if(mode === 'Pemasukan') {
          tin.classList.add('active', 'in');
          tout.classList.remove('active', 'out');
        } else {
          tout.classList.add('active', 'out');
          tin.classList.remove('active', 'in');
        }
      }

      async function submitData() {
        const btn = document.getElementById('save-btn');
        const form = document.getElementById('transaksiForm');
        
        const payload = {
          jenisBuku: document.getElementById('input-jenis').value,
          tipe: document.getElementById('input-tipe').value,
          deskripsi: form.deskripsi.value,
          nominal: form.nominal.value,
          keterangan: form.keterangan.value
        };

        if(!payload.nominal || !payload.deskripsi) {
          return Swal.fire({
            background: '#fff9fb',
            color: '#ff85a1',
            icon: 'warning',
            title: 'Lengkapi Data',
            text: 'Isi rincian dan nominal dulu ya!',
            confirmButtonColor: '#ffb7ce'
          });
        }

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-heart fa-beat"></i> Sedang Menyimpan...';

        try {
          const res = await fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify(payload)
          });
          const result = await res.json();

          if (result.result.includes("Berhasil")) {
            Swal.fire({
              background: '#fff9fb',
              icon: 'success',
              title: 'Berhasil!',
              text: 'Catatan keuangan sudah tersimpan rapi.',
              timer: 2000,
              showConfirmButton: false
            }).then(() => {
              form.reset();
              loadBalance();
            });
          }
        } catch (e) {
          Swal.fire({
            background: '#fff9fb',
            icon: 'error',
            title: 'Gagal',
            text: 'Koneksi internet bermasalah.',
            confirmButtonColor: '#ffb7ce'
          });
        } finally {
          btn.disabled = false;
          btn.innerHTML = 'Simpan Catatan <i class="fas fa-save"></i>';
        }
      }
    </script>
  </body>
</html>
