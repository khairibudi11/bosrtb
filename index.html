<!DOCTYPE html>
<html lang="id">
  <head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIP-BOS | Blossom Edition Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
      :root {
        --primary: #ffb7ce; 
        --primary-dark: #ff85a1;
        --secondary: #dcd3ff; 
        --accent: #b2f2bb; 
        --text: #5f6368;
        --bg: #fff9fb;
        --card: #ffffff;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'Quicksand', sans-serif;
        background-color: var(--bg);
        color: var(--text);
        min-height: 100vh;
        overflow-x: hidden;
        padding: 40px 20px;
        position: relative;
      }

      /* Dekorasi Latar Belakang agar tidak kosong */
      body::before {
        content: '';
        position: fixed;
        top: -100px;
        right: -100px;
        width: 400px;
        height: 400px;
        background: radial-gradient(circle, rgba(255,183,206,0.15) 0%, transparent 70%);
        z-index: -1;
      }

      body::after {
        content: '';
        position: fixed;
        bottom: -100px;
        left: -100px;
        width: 500px;
        height: 500px;
        background: radial-gradient(circle, rgba(220,211,255,0.15) 0%, transparent 70%);
        z-index: -1;
      }

      .app-container {
        width: 100%;
        max-width: 1200px; /* Diperlebar mengikuti referensi foto */
        margin: 0 auto;
      }

      /* --- HEADER --- */
      header {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        margin-bottom: 40px;
        border-bottom: 2px solid rgba(255, 183, 206, 0.2);
        padding-bottom: 20px;
      }

      .brand {
        text-align: left;
      }

      .header-icon {
        font-size: 30px;
        color: var(--primary-dark);
        margin-right: 10px;
      }

      header h1 {
        font-size: 28px;
        font-weight: 700;
        color: var(--primary-dark);
        display: inline-block;
      }

      header p {
        font-size: 14px;
        color: #a5aab0;
        margin-top: 5px;
      }

      .system-info {
        text-align: right;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #ffb7ce;
      }

      /* --- NAVIGATION --- */
      .nav-pills {
        display: flex;
        gap: 15px;
        margin-bottom: 30px;
      }

      .pill {
        padding: 14px 28px;
        border: none;
        background: var(--card);
        border-radius: 15px;
        font-family: inherit;
        font-weight: 700;
        color: #ff85a1;
        cursor: pointer;
        transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        box-shadow: 0 4px 10px rgba(255, 183, 206, 0.1);
      }

      .pill.active {
        background: linear-gradient(135deg, var(--primary), var(--primary-dark));
        color: white;
        box-shadow: 0 8px 20px rgba(255, 183, 206, 0.3);
        transform: translateY(-2px);
      }

      /* --- MAIN GRID --- */
      .main-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 30px;
      }

      @media (min-width: 992px) {
        .main-grid { grid-template-columns: 1.2fr 1fr; }
      }

      .card {
        background: var(--card);
        border-radius: 25px;
        padding: 45px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.03);
        border: 1px solid rgba(255, 183, 206, 0.1);
        position: relative;
        overflow: hidden;
      }

      /* Balance Section (Left) */
      .balance-card {
        display: flex;
        flex-direction: column;
        justify-content: center;
        min-height: 400px;
        background: linear-gradient(160deg, #ffffff 0%, #fff5f8 100%);
      }

      .balance-card::before {
        content: '';
        position: absolute;
        top: 0; left: 0; width: 6px; height: 100%;
        background: var(--primary);
      }

      .bal-label {
        font-size: 14px;
        font-weight: 700;
        color: var(--primary-dark);
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-bottom: 20px;
      }

      #display-saldo {
        font-size: 64px; /* Lebih besar */
        font-weight: 700;
        color: #444;
        word-break: break-all;
        line-height: 1.1;
      }

      .sync-status {
        margin-top: 30px;
        font-size: 13px;
        color: #2ecc71;
        display: flex;
        align-items: center;
        gap: 8px;
        font-weight: 600;
      }

      /* Form Section (Right) */
      .form-title {
        font-size: 22px;
        font-weight: 700;
        margin-bottom: 30px;
        color: #555;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .type-toggle {
        display: flex;
        background: #f8f9fa;
        padding: 5px;
        border-radius: 12px;
        margin-bottom: 30px;
        border: 1px solid #eee;
      }

      .t-btn {
        flex: 1;
        padding: 14px;
        border: none;
        background: transparent;
        border-radius: 8px;
        font-weight: 700;
        font-family: inherit;
        cursor: pointer;
        transition: 0.2s;
        color: #adb5bd;
      }

      .t-btn.active.in { background: var(--accent); color: #2b8a3e; }
      .t-btn.active.out { background: #ff8787; color: white; }

      .input-wrapper { margin-bottom: 25px; }
      .input-wrapper label {
        display: block;
        font-size: 12px;
        font-weight: 800;
        margin-bottom: 10px;
        color: #888;
        text-transform: uppercase;
      }

      .pastel-input {
        width: 100%;
        padding: 16px 20px;
        background: #fdfdfe;
        border: 1.5px solid #eee;
        border-radius: 12px;
        font-family: inherit;
        font-size: 16px;
        outline: none;
        transition: 0.3s;
      }

      .pastel-input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 4px rgba(255, 183, 206, 0.15);
      }

      .btn-submit {
        width: 100%;
        padding: 20px;
        background: #ffb7ce;
        color: white;
        border: none;
        border-radius: 15px;
        font-weight: 700;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
        box-shadow: 0 10px 20px rgba(255, 183, 206, 0.2);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .btn-submit:hover {
        background: var(--primary-dark);
        transform: translateY(-2px);
      }

      .btn-submit:disabled { background: #eee; cursor: not-allowed; box-shadow: none; }

      /* Dekorasi Bunga Tambahan */
      .flower-deco {
        position: absolute;
        bottom: 20px;
        right: 20px;
        font-size: 80px;
        opacity: 0.03;
        color: var(--primary-dark);
        pointer-events: none;
      }
    </style>
  </head>
  <body>

    <div class="app-container">
      <header>
        <div class="brand">
          <i class="fas fa-leaf header-icon"></i>
          <h1>SIP-BOS <span style="font-weight: 300;">PRO</span></h1>
          <p>Portal Keuangan Terpadu SDN Rantau Bujur</p>
        </div>
        <div class="system-info">
          Sistem Keamanan Tingkat Tinggi<br>
          <span style="font-weight: 700;">Encrypted Cloud Server</span>
        </div>
      </header>

      <nav class="nav-pills">
        <button class="pill active" onclick="switchSource('BOS Reguler', this)">BOS REGULER</button>
        <button class="pill" onclick="switchSource('BOS Kas', this)">BOS KAS SEKOLAH</button>
      </nav>

      <div class="main-grid">
        <!-- BALANCE SECTION -->
        <div class="card balance-card">
          <span class="bal-label" id="current-tag">Balance BOS Reguler</span>
          <div id="display-saldo">...</div>
          <div class="sync-status" id="sync-status">
            <i class="fas fa-circle-notch fa-spin"></i> Menghubungkan ke server...
          </div>
          <i class="fas fa-spa flower-deco"></i>
        </div>

        <!-- FORM SECTION -->
        <div class="card">
          <h3 class="form-title">Pencatatan Baru</h3>
          
          <form id="transaksiForm">
            <input type="hidden" id="input-jenis" name="jenisBuku" value="BOS Reguler">
            <input type="hidden" id="input-tipe" name="tipe" value="Pemasukan">

            <div class="type-toggle">
              <button type="button" class="t-btn active in" id="toggle-in" onclick="changeMode('Pemasukan')">PEMASUKAN</button>
              <button type="button" class="t-btn" id="toggle-out" onclick="changeMode('Pengeluaran')">PENGELUARAN</button>
            </div>

            <div class="input-wrapper">
              <label>Uraian Transaksi</label>
              <input type="text" name="deskripsi" class="pastel-input" placeholder="Input rincian kegiatan..." required>
            </div>

            <div class="input-wrapper">
              <label>Nominal (IDR)</label>
              <input type="text" name="nominal" id="nominal-input" class="pastel-input" placeholder="0" required onkeyup="moneyFormat(this)">
            </div>

            <div class="input-wrapper">
              <label>Referensi Dokumentasi</label>
              <input type="text" name="keterangan" class="pastel-input" placeholder="Nomor BKU / Kode Nota">
            </div>

            <button type="button" class="btn-submit" id="save-btn" onclick="submitData()">
              Otorisasi & Simpan <i class="fas fa-lock"></i>
            </button>
          </form>
        </div>
      </div>
    </div>

    <script>
      const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz6LCNUKo_J26dfqGRVPUd9LpPlM27S0LBF5ztctlMt2zNDiiSsM0dLlQhiioucNuaqBQ/exec";
      
      const balanceCache = {
        'BOS Reguler': null,
        'BOS Kas': null
      };

      window.onload = () => {
        fetchAllBalances();
      };

      function fetchAllBalances() {
        ['BOS Reguler', 'BOS Kas'].forEach(source => {
          fetch(`${SCRIPT_URL}?sheet=${encodeURIComponent(source)}`)
            .then(res => res.json())
            .then(data => {
              balanceCache[source] = data.saldo;
              if (document.getElementById('input-jenis').value === source) {
                updateBalanceDisplay(data.saldo);
              }
            })
            .catch(err => console.error(err));
        });
      }

      function moneyFormat(el) {
        let value = el.value.replace(/\D/g, '');
        el.value = value.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
      }

      function switchSource(source, btn) {
        document.querySelectorAll('.pill').forEach(l => l.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('input-jenis').value = source;
        document.getElementById('current-tag').innerText = "Balance " + source;
        
        if (balanceCache[source]) {
          updateBalanceDisplay(balanceCache[source]);
        } else {
          document.getElementById('display-saldo').innerText = "...";
          document.getElementById('display-saldo').style.opacity = "0.5";
        }
        
        refreshSingleBalance(source);
      }

      function refreshSingleBalance(source) {
        fetch(`${SCRIPT_URL}?sheet=${encodeURIComponent(source)}`)
          .then(res => res.json())
          .then(data => {
            balanceCache[source] = data.saldo;
            if (document.getElementById('input-jenis').value === source) {
              updateBalanceDisplay(data.saldo);
            }
          });
      }

      function updateBalanceDisplay(value) {
        const saldoDiv = document.getElementById('display-saldo');
        const syncStatus = document.getElementById('sync-status');
        
        saldoDiv.innerText = value;
        saldoDiv.style.opacity = "1";
        syncStatus.innerHTML = '<i class="fas fa-check-circle"></i> VERIFIED BY TREASURY SYSTEM';
        
        const len = value.length;
        if(len > 16) saldoDiv.style.fontSize = "36px";
        else if(len > 12) saldoDiv.style.fontSize = "48px";
        else saldoDiv.style.fontSize = "64px";
      }

      function changeMode(mode) {
        document.getElementById('input-tipe').value = mode;
        const tin = document.getElementById('toggle-in');
        const tout = document.getElementById('toggle-out');

        if(mode === 'Pemasukan') {
          tin.classList.add('active', 'in');
          tout.classList.remove('active', 'out');
        } else {
          tout.classList.add('active', 'out');
          tin.classList.remove('active', 'in');
        }
      }

      async function submitData() {
        const btn = document.getElementById('save-btn');
        const form = document.getElementById('transaksiForm');
        const currentSource = document.getElementById('input-jenis').value;
        
        const payload = {
          jenisBuku: currentSource,
          tipe: document.getElementById('input-tipe').value,
          deskripsi: form.deskripsi.value,
          nominal: form.nominal.value,
          keterangan: form.keterangan.value
        };

        if(!payload.nominal || !payload.deskripsi) {
          return Swal.fire({
            background: '#fff',
            icon: 'warning',
            title: 'DATA TIDAK LENGKAP',
            text: 'Harap lengkapi uraian dan nominal sebelum menyimpan.',
            confirmButtonColor: '#ffb7ce'
          });
        }

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-sync fa-spin"></i> MEMPROSES DATA...';

        try {
          const res = await fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify(payload)
          });
          const result = await res.json();

          if (result.result.includes("Berhasil")) {
            Swal.fire({
              background: '#fff',
              icon: 'success',
              title: 'OTORISASI BERHASIL',
              text: 'Data telah diamankan ke database cloud SDN Rantau Bujur.',
              timer: 2000,
              showConfirmButton: false
            }).then(() => {
              form.reset();
              refreshSingleBalance(currentSource);
            });
          }
        } catch (e) {
          Swal.fire({
            background: '#fff',
            icon: 'error',
            title: 'KONEKSI TERPUTUS',
            text: 'Gagal menghubungi server.',
            confirmButtonColor: '#ffb7ce'
          });
        } finally {
          btn.disabled = false;
          btn.innerHTML = 'Otorisasi & Simpan <i class="fas fa-lock"></i>';
        }
      }
    </script>
  </body>
</html>
